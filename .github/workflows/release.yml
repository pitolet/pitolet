name: Release (npm)

on:
  push:
    tags:
      - 'v*'

# Publishing uses npm Trusted Publishing (OIDC), not an NPM_TOKEN secret.
# Configured on npmjs.com: package pitolet → Settings → Trusted Publisher →
# GitHub Actions, org pitolet, repo pitolet, workflow release.yml.
permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Set browser QA artifact directory
        run: echo "PITOLET_QA_ARTIFACT_DIR=$RUNNER_TEMP/pitolet-browser-qa" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify tag and package versions
        id: release
        run: node scripts/check-release-version.mjs "$GITHUB_REF_NAME"

      # Trusted publishing needs npm 11.5.1 or newer. Pin the tool instead of
      # installing a mutable "latest" release in the publishing job.
      - name: Install trusted-publishing npm client
        run: npm install --global npm@11.6.2

      - name: Locate PostgreSQL binaries (cloud tests spin ephemeral instances)
        run: |
          if ! command -v pg_config >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y postgresql
          fi
          echo "PGBIN=$(pg_config --bindir)" >> "$GITHUB_ENV"
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium for website-import and landing-page tests
        run: node packages/server/node_modules/playwright-core/cli.js install --with-deps chromium

      - name: Run release quality gates
        run: pnpm verify
      - name: Keep browser QA screenshots and axe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-browser-qa-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/pitolet-browser-qa
          if-no-files-found: warn
          retention-days: 30
      - name: Check AGPL boundary
        run: |
          if grep -rE "@pitolet/cloud|apps/cloud" packages/ --include='*.ts' --include='*.tsx' --include='*.json'; then
            echo "::error::AGPL boundary violation: packages/ references commercial cloud code"
            exit 1
          fi

      - name: Publish to npm with provenance
        working-directory: packages/server
        env:
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            npm_tag=next
          else
            npm_tag=latest
          fi
          npm publish --access public --provenance --tag "$npm_tag"

  docker:
    name: Publish matching Docker images
    needs: publish
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
