name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Locate PostgreSQL binaries (cloud tests spin ephemeral instances)
        run: |
          if ! command -v pg_config >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y postgresql
          fi
          echo "PGBIN=$(pg_config --bindir)" >> "$GITHUB_ENV"
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm vitest run
      - run: pnpm build
      - name: License boundary (OSS core must never reference commercial code)
        run: |
          if grep -rE "@pitolet/cloud|apps/cloud" packages/ --include='*.ts' --include='*.tsx' --include='*.json'; then
            echo "::error::AGPL boundary violation: packages/ references commercial cloud code"
            exit 1
          fi
          echo "License boundary clean"

  # The cloud Dockerfile assembles artifacts from several workspace packages.
  # Building it on every change catches runtime-image layout errors that the
  # TypeScript and Vite builds cannot see (for example, nesting dashboard/dist
  # under a source dashboard directory and serving the development index).
  cloud-image-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production cloud image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cloud/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
