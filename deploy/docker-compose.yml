# Pitolet Cloud — single-VPS production stack (Docker Compose v2).
# Copy this dir to /opt/pitolet on the host, fill .env from .env.example,
# then `docker compose up -d`. See README.md for the full runbook.

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./static:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  app:
    image: 'ghcr.io/pitolet/pitolet-cloud:${TAG:?set an immutable TAG in .env}'
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: '${DATABASE_URL:?set DATABASE_URL in .env}'
      BETTER_AUTH_SECRET: '${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}'
      BETTER_AUTH_URL: '${BETTER_AUTH_URL:?set BETTER_AUTH_URL in .env}'
      PITOLET_TRUST_PROXY: '${PITOLET_TRUST_PROXY:-true}'
      PITOLET_METRICS_TOKEN: '${PITOLET_METRICS_TOKEN:-}'
      SENTRY_DSN: '${SENTRY_DSN:-}'
      RESEND_API_KEY: '${RESEND_API_KEY:?set RESEND_API_KEY in .env}'
      RESEND_FROM: '${RESEND_FROM:-Pitolet <login@pitolet.com>}'
      GITHUB_CLIENT_ID: '${GITHUB_CLIENT_ID:-}'
      GITHUB_CLIENT_SECRET: '${GITHUB_CLIENT_SECRET:-}'
      GOOGLE_CLIENT_ID: '${GOOGLE_CLIENT_ID:-}'
      GOOGLE_CLIENT_SECRET: '${GOOGLE_CLIENT_SECRET:-}'
      PADDLE_BILLING_DISABLED: '${PADDLE_BILLING_DISABLED:-}'
      PADDLE_API_KEY: '${PADDLE_API_KEY:-}'
      PADDLE_WEBHOOK_SECRET: '${PADDLE_WEBHOOK_SECRET:-}'
      PADDLE_PRICE_ID_PRO: '${PADDLE_PRICE_ID_PRO:-}'
      PADDLE_PRODUCT_ID_PRO: '${PADDLE_PRODUCT_ID_PRO:-}'
      PADDLE_ENV: '${PADDLE_ENV:-}'
    volumes:
      - app_data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    # No published ports — Caddy reaches it over the compose network as app:8080.

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pitolet}
      POSTGRES_USER: ${POSTGRES_USER:-pitolet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pitolet} -d ${POSTGRES_DB:-pitolet}']
      interval: 10s
      timeout: 5s
      retries: 5
    # No published ports — reachable only on the compose network.

  # Nightly backups: one restic snapshot containing a verified custom-format
  # database dump and the asset volume. Weekly prune.
  backup:
    build:
      context: ./backup
    image: pitolet-backup:local
    restart: unless-stopped
    environment:
      RESTIC_REPOSITORY: '${RESTIC_REPOSITORY:?set RESTIC_REPOSITORY in .env}'
      RESTIC_PASSWORD: '${RESTIC_PASSWORD:?set RESTIC_PASSWORD in .env}'
      POSTGRES_DB: '${POSTGRES_DB:-pitolet}'
      POSTGRES_USER: '${POSTGRES_USER:-pitolet}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}'
      BACKUP_INTERVAL_SECONDS: '${BACKUP_INTERVAL_SECONDS:-86400}'
    volumes:
      - app_data:/data:ro
      - backup_restore:/restore
      - backup_stage:/tmp
      # Put a dedicated id_ed25519 and known_hosts in this host directory.
      - ${RESTIC_SSH_DIR:-./backup-ssh}:/root/.ssh:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 2m
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'test -f /tmp/last-backup && test $$(find /tmp/last-backup -mmin -1560 | wc -l) -eq 1',
        ]
      interval: 30m
      timeout: 10s
      retries: 2
      start_period: 30m

volumes:
  caddy_data:
  caddy_config:
  app_data:
  pg_data:
  backup_restore:
  backup_stage:
